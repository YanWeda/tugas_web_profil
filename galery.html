<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Weda</title>

    <style>
        /* --- Style Dasar --- */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Style Tombol Kembali --- */
        .top-bar {
            padding: 20px 50px;
            display: flex;
            align-items: center;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            background-image: linear-gradient(to right, #ADD8E6, #87CEFA);
            color: #333;
            text-decoration: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s, opacity 0.3s;
        }

        .back-btn:hover {
            opacity: 0.9;
            transform: translateX(-5px); 
            color: #0056b3;
        }

        .back-btn .icon {
            font-size: 20px;
            margin-right: 8px;
        }

        /* --- Style Container Galeri Utama --- */
        .gallery-wrapper {
            max-width: 1000px;
            margin: 0 auto 50px auto; 
            padding: 0 20px;
            flex: 1; 
            width: 100%;
            box-sizing: border-box;
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 30px;
            color: #555;
            border-bottom: 2px solid #87CEFA;
            padding-bottom: 15px;
            display: inline-block;
            width: 100%;
        }

        /* --- Grid Layout untuk Foto-foto Galeri --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: center;
        }

        .gallery-item:hover {
            transform: scale(1.03); 
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        /* Thumbnail Gambar (Kotak Luar) */
        .gallery-item img {
            width: 100%;
            height: 200px; 
            object-fit: cover; /* Dibuat cover agar grid rapi dan seragam */
            border-radius: 5px;
            cursor: pointer; /* Mengubah kursor jadi tangan saat diarahkan ke foto */
        }

        .gallery-item p {
            margin: 15px 0 5px 0;
            color: #444;
            font-weight: bold;
            font-size: 15px;
        }

        /* =========================================
           STYLE UNTUK POPUP (LIGHTBOX) FULL GAMBAR
           ========================================= */
        .lightbox {
            display: none; /* Sembunyikan popup secara default */
            position: fixed;
            z-index: 999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85); /* Latar hitam transparan */
            justify-content: center;
            align-items: center;
        }

        /* KUNCI: Saat ID lightbox dipanggil (di-klik), ubah menjadi terlihat (flex) */
        .lightbox:target {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90vh; /* Memastikan foto tidak melebihi tinggi layar */
            object-fit: contain; /* Menampilkan 100% foto tanpa terpotong */
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .close-btn:hover {
            color: #87CEFA; /* Berubah biru saat tombol silang disentuh */
        }

        /* --- Style Footer --- */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px 0;
            margin-top: auto; 
        }

        footer p {
            color: white; 
            margin: 0;
            font-size: 14px;
        }

        /* Responsive untuk HP */
        @media (max-width: 600px) {
            .top-bar { padding: 20px; }
            .gallery-grid { grid-template-columns: 1fr; }
            .close-btn { top: 10px; right: 20px; font-size: 40px; }
        }
    </style>
</head>
