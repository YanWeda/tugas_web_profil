<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Style untuk Navbar dengan Gradasi Biru Muda --- */
        nav {
            background-image: linear-gradient(to right, #ADD8E6, #87CEFA); 
            display: flex;
            justify-content: flex-start; 
            padding: 15px 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        nav a {
            color: #333;
            text-decoration: none;
            padding: 10px 20px;
            margin-right: 10px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            transition: background 0.3s, color 0.3s;
        }

        nav a:hover {
            background-color: #e6f7ff; 
            color: #0056b3; 
        }

        /* --- STYLE BARU: Tandai menu yang aktif secara visual --- */
        nav a.active {
            background-color: #0056b3;
            color: white;
        }
        /* ---------------------------------------------------- */

        .wrapper {
            display: flex;
            gap: 50px;
            align-items: center;
            justify-content: center;
            padding: 50px;
            flex: 1; 
        }

        .left {
            max-width: 400px;
        }

        h1 {
            margin-bottom: 5px;
        }

        h2, h3 {
            margin: 5px 0;
            font-weight: normal;
            color: #555;
        }

        p {
            line-height: 1.6;
            color: #444;
        }

        img {
            width: 180px;
            border-radius: 10px;
            margin: 20px 0;
        }

        iframe {
            width: 450px;
            height: 350px;
            border: 0;
            border-radius: 10px;
        }

        /* --- STYLE FOOTER --- */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px 0;
            margin-top: auto; 
            width: 100%;
        }

        footer p {
            color: white; 
            margin: 0;
            font-size: 14px;
        }

        /* Responsive untuk HP */
        @media (max-width: 900px) {
            .wrapper {
                flex-direction: column;
                text-align: center;
            }

            iframe {
                width: 100%;
                height: 300px;
            }

            nav {
                flex-direction: column;
                align-items: flex-start;
                padding: 15px 20px;
                background-image: linear-gradient(to bottom, #ADD8E6, #87CEFA);
            }
            
            nav a {
                margin: 5px 0;
                width: 100%;
                box-sizing: border-box; 
            }

            /* Biar tombol aktif tidak penuh layar di HP */
            nav a.active { 
                width: auto; 
                align-self: center; 
            } 
        }

    </style>
</head>

<body>

    </nav>
